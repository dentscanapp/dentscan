<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DentScan 🦷 Mobile</title>
<style>
  body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; }
  h1 { text-align: center; }
  input, button { font-size: 18px; margin: 10px 0; width: 100%; padding: 10px; }
  #result { margin-top: 20px; font-size: 16px; }
  .paywall-card { background: linear-gradient(135deg, #111 0%, #333 100%); color: white; border-radius: 16px; padding: 2rem 1.5rem; text-align: center; margin-bottom: 1rem; }
  .paywall-title { font-size: 20px; font-weight: bold; margin-bottom: 8px; }
  .paywall-text { font-size: 14px; opacity: 0.9; margin-bottom: 1rem; line-height: 1.5; color: #eee; }
  .btn-premium { background: #F6C844; color: #111; width: 100%; padding: 14px; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; border: none; }
</style>
</head>
<body>

<h1>DentScan 🦷</h1>
<input type="file" id="fileInput" accept="image/*" capture="environment">
<button id="analyzeBtn">Analyze My Teeth</button>
<div id="result"></div>

<script>
const fileInput = document.getElementById('fileInput');
const analyzeBtn = document.getElementById('analyzeBtn');
const resultDiv = document.getElementById('result');

analyzeBtn.addEventListener('click', async () => {
  const today = new Date().toISOString().split('T')[0];
  const lastScan = localStorage.getItem('dentscan_last_date');

  if(lastScan === today) {
    // Fizetős fal
    resultDiv.innerHTML = `
      <div class="paywall-card">
        <div class="paywall-title">Daily Limit Reached</div>
        <div class="paywall-text">The free version allows 1 AI scan per day. Upgrade to Premium for unlimited scans and history tracking.</div>
        <button class="btn-premium" onclick="upgradeToPremium()">Upgrade to Premium</button>
      </div>
    `;
    return;
  }

  const file = fileInput.files[0];
  if(!file){ alert('Please select a photo'); return; }

  const reader = new FileReader();
  reader.readAsDataURL(file);
  reader.onload = async () => {
    const base64Image = reader.result.split(',')[1]; // csak a base64
    try {
      resultDiv.innerHTML = 'Analyzing your teeth...';
      const res = await fetch('/api/analyze', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ imageBase64: base64Image, imageMime: file.type || 'image/jpeg' })
      });
      const data = await res.json();
      if(data.error) throw new Error(data.error);

      // Elmentjük a mai dátumot
      localStorage.setItem('dentscan_last_date', today);

      // Eredmény megjelenítése egyszerű JSON formában (később szebbre lehet)
      resultDiv.innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre>`;
    } catch(err) {
      resultDiv.innerHTML = 'Error: ' + err.message;
    }
  };
});

async function upgradeToPremium() {
  try {
    const res = await fetch('/api/create-checkout', { method: 'POST' });
    const data = await res.json();
    if(data.url) window.location.href = data.url;
  } catch(err) {
    alert('Error starting payment: ' + err.message);
  }
}
</script>

</body>
</html>
