<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
let map = null;
 
function locate() {
  const btn = document.getElementById('locateBtn');
  const status = document.getElementById('status');
  btn.disabled = true;
  btn.innerHTML = `<span style="display:inline-block;width:18px;height:18px;border:2px solid rgba(255,255,255,0.4);border-top-color:white;border-radius:50%;animation:spin 0.8s linear infinite"></span> Locating you...`;
  status.textContent = '';
  document.getElementById('results').innerHTML = '';
  document.getElementById('gmapsBtnWrap').innerHTML = '';
 
  if (!navigator.geolocation) {
    status.textContent = 'Geolocation is not supported by your browser.';
    btn.disabled = false;
    return;
  }
 
  navigator.geolocation.getCurrentPosition(
    pos => fetchDentists(pos.coords.latitude, pos.coords.longitude),
    err => {
      status.textContent = 'Could not get your location. Please allow location access and try again.';
      btn.disabled = false;
      btn.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg> Try again`;
    },
    { enableHighAccuracy: true, timeout: 10000 }
  );
}
 
async function fetchDentists(lat, lng) {
  const status = document.getElementById('status');
  status.textContent = 'Searching for dentists nearby...';
 
  const query = `[out:json][timeout:15];(node["amenity"="dentist"](around:5000,${lat},${lng});way["amenity"="dentist"](around:5000,${lat},${lng}););out center 20;`;
 
  try {
    const res = await fetch('https://overpass-api.de/api/interpreter', { method: 'POST', body: query });
    const data = await res.json();
    showResults(data.elements, lat, lng);
  } catch (e) {
    document.getElementById('status').textContent = 'Could not load results. Please try again.';
    document.getElementById('locateBtn').disabled = false;
    document.getElementById('locateBtn').innerHTML = 'Try again';
  }
}
 
function calcDist(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const dLat = (lat2-lat1)*Math.PI/180, dLon = (lon2-lon1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return Math.round(R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)));
}
function fmtDist(m) { return m < 1000 ? `${m} m away` : `${(m/1000).toFixed(1)} km away`; }
 
function showResults(elements, userLat, userLng) {
  const status = document.getElementById('status');
  const resultsDiv = document.getElementById('results');
  const mapDiv = document.getElementById('map');
  const btn = document.getElementById('locateBtn');
 
  btn.disabled = false;
  btn.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg> Refresh`;
 
  const all = elements.map(el => {
    const elLat = el.lat || el.center?.lat;
    const elLng = el.lon || el.center?.lon;
    return {
      name: el.tags?.name || 'Dental Clinic',
      address: [el.tags?.['addr:street'], el.tags?.['addr:housenumber'], el.tags?.['addr:city']].filter(Boolean).join(' ') || '',
      phone: el.tags?.phone || el.tags?.['contact:phone'] || '',
      lat: elLat, lng: elLng,
      distance: calcDist(userLat, userLng, elLat, elLng)
    };
  }).filter(d => d.lat && d.lng).sort((a,b) => a.distance - b.distance);
 
  // Google Maps button always visible
  document.getElementById('gmapsBtnWrap').innerHTML = `
    <a href="https://www.google.com/maps/search/dentist/@${userLat},${userLng},14z" target="_blank" rel="noopener" class="btn-gmaps fade-up">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      See all on Google Maps
    </a>`;
 
  if (all.length === 0) {
    status.textContent = '';
    resultsDiv.innerHTML = `<div class="empty fade-up"><div class="empty-icon">🔍</div><div class="empty-title">No dentists found nearby</div><div class="empty-text">No clinics found within 5km. Try Google Maps instead.</div></div>`;
    return;
  }
 
  // Only top 3
  const dentists = all.slice(0, 3);
  status.textContent = `Showing the 3 nearest dentists`;
 
  // Map
  mapDiv.style.display = 'block';
  if (map) { map.remove(); map = null; }
  map = L.map('map').setView([userLat, userLng], 14);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(map);
 
  // User marker
  const userIcon = L.divIcon({
    html: `<div style="width:14px;height:14px;background:#0A9B72;border:3px solid white;border-radius:50%;box-shadow:0 2px 6px rgba(0,0,0,0.3)"></div>`,
    className: '', iconAnchor: [7,7]
  });
  L.marker([userLat, userLng], { icon: userIcon }).addTo(map).bindPopup('You are here');
 
  // Dentist markers numbered 1-3
  dentists.forEach((d, i) => {
    const icon = L.divIcon({
      html: `<div style="width:30px;height:30px;background:#0A9B72;border:2.5px solid white;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:white;box-shadow:0 2px 8px rgba(0,0,0,0.2)">${i+1}</div>`,
      className: '', iconAnchor: [15,15]
    });
    L.marker([d.lat, d.lng], { icon })
      .addTo(map)
      .bindPopup(`<strong>${d.name}</strong>${d.address ? '<br>'+d.address : ''}<br><small>${fmtDist(d.distance)}</small>`);
  });
 
  // List
  resultsDiv.innerHTML = `<div class="section-label">3 nearest dentists</div>` +
    dentists.map((d, i) => `
      <a href="https://www.google.com/maps/dir/?api=1&destination=${d.lat},${d.lng}" target="_blank" rel="noopener" class="dentist-card fade-up" style="animation-delay:${i*0.08}s">
        <div class="dentist-num">${i+1}</div>
        <div class="dentist-info">
          <div class="dentist-name">${d.name}</div>
          ${d.address ? `<div class="dentist-address">${d.address}</div>` : ''}
          <div class="dentist-meta">
            <span class="dentist-dist">📍 ${fmtDist(d.distance)}</span>
            ${d.phone ? `<span class="dentist-phone">📞 ${d.phone}</span>` : ''}
          </div>
        </div>
        <div class="dentist-arrow">→</div>
      </a>`).join('');
}
</script>
