<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DentScan – Find a Dentist</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body { font-family: Arial; background:#f4f7f6; padding:20px; }
button { padding:15px; font-size:16px; cursor:pointer; }
#map { height:300px; margin-top:15px; display:none; }
.card { background:white; padding:10px; margin-top:10px; border-radius:10px; }
</style>
</head>

<body>

<h2>Find nearby dentists</h2>

<button onclick="locate()" id="btn">Use my location</button>
<div id="status"></div>
<div id="map"></div>
<div id="results"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
let map;

function locate() {
  const btn = document.getElementById("btn");
  btn.disabled = true;
  btn.innerText = "Locating...";

  navigator.geolocation.getCurrentPosition(
    pos => fetchDentists(pos.coords.latitude, pos.coords.longitude),
    err => {
      document.getElementById("status").innerText = "Location access denied.";
      btn.disabled = false;
      btn.innerText = "Try again";
    }
  );
}

async function fetchDentists(lat, lng) {
  const status = document.getElementById("status");
  const btn = document.getElementById("btn");

  status.innerText = "Searching...";

  const query = `
[out:json][timeout:25];
(
 node["amenity"="dentist"](around:3000,${lat},${lng});
 way["amenity"="dentist"](around:3000,${lat},${lng});
 relation["amenity"="dentist"](around:3000,${lat},${lng});
);
out center;
`;

  const endpoints = [
    "https://overpass-api.de/api/interpreter",
    "https://overpass.kumi.systems/api/interpreter"
  ];

  let data = null;

  for (let url of endpoints) {
    try {
      const res = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "text/plain" },
        body: query
      });

      const text = await res.text();

      if (!res.ok) throw new Error("HTTP error");

      data = JSON.parse(text);
      break;

    } catch (e) {
      console.warn("Endpoint failed:", url);
    }
  }

  if (!data) {
    status.innerText = "Hiba: nem sikerült adatot betölteni.";
    btn.disabled = false;
    btn.innerText = "Retry";
    return;
  }

  showResults(data.elements || [], lat, lng);
}

function distance(a,b,c,d){
  const R=6371e3;
  const dLat=(c-a)*Math.PI/180;
  const dLon=(d-b)*Math.PI/180;
  const x=Math.sin(dLat/2)**2+
    Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dLon/2)**2;
  return Math.round(R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x)));
}

function showResults(elements, lat, lng) {
  const resDiv = document.getElementById("results");
  const mapDiv = document.getElementById("map");
  const status = document.getElementById("status");
  const btn = document.getElementById("btn");

  btn.disabled = false;
  btn.innerText = "Refresh";

  const list = elements
    .map(e => {
      const la = e.lat || (e.center && e.center.lat);
      const lo = e.lon || (e.center && e.center.lon);

      if (la == null || lo == null) return null;

      return {
        name: e.tags?.name || "Dentist",
        lat: la,
        lng: lo,
        dist: distance(lat,lng,la,lo)
      };
    })
    .filter(x => x)
    .sort((a,b)=>a.dist-b.dist)
    .slice(0,5);

  if (!list.length) {
    status.innerText = "No dentists found.";
    return;
  }

  status.innerText = list.length + " found";

  mapDiv.style.display = "block";

  if (map) map.remove();

  map = L.map("map").setView([lat,lng],14);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
    .addTo(map);

  L.marker([lat,lng]).addTo(map).bindPopup("You");

  resDiv.innerHTML = "";

  list.forEach(d => {
    L.marker([d.lat,d.lng]).addTo(map)
      .bindPopup(d.name);

    resDiv.innerHTML += `
      <div class="card">
        <b>${d.name}</b><br>
        ${d.dist} m
      </div>
    `;
  });
}
</script>

</body>
</html>
